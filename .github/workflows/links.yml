name: link-check
on:
  pull_request:
    paths: ['README.md']
  schedule:
    # Weekly Monday 9:00 UTC
    - cron: '0 9 * * 1'

jobs:
  lychee:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --max-concurrency 3 --timeout 20 README.md
          fail: true
